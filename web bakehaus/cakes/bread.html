<!-- TOMBOL KATEGORI -->
<div class="container text-center my-4">
    <a href="product.html" class="btn btn-warning m-1">Semua</a>
    <a href="bread.html" class="btn btn-dark m-1">Bread</a>

<div class="container">
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card product-card h-100">
                <img src="Croissant.jpeg" class="product-img" alt="Croissant">
                <div class="card-body text-center">
                    <h5>Croissant</h5>
                    <p>Rp18.000</p>
                    <button class="btn btn-primary" onclick="tambahKeranjang('Croissant',18000)">Tambah</button>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card product-card h-100">
                <img src="Pretzel.jpeg" class="product-img" alt="Pretzel">
                <div class="card-body text-center">
                    <h5>Pretzel</h5>
                    <p>Rp15.000</p>
                    <button class="btn btn-primary" onclick="tambahKeranjang('Pretzel',15000)">Tambah</button>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card product-card h-100">
                <img src="Baguette.jpeg" class="product-img" alt="Baguette">
                <div class="card-body text-center">
                    <h5>Baguette</h5>
                    <p>Rp22.000</p>
                    <button class="btn btn-primary" onclick="tambahKeranjang('Baguette',22000)">Tambah</button>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card product-card h-100">
                <img src="Bread (Original).jpeg" class="product-img" alt="Bread">
                <div class="card-body text-center">
                    <h5>Original Bread</h5>
                    <p>Rp20.000</p>
                    <button class="btn btn-primary" onclick="tambahKeranjang('Original Bread',20000)">Tambah</button>
